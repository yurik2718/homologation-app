# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Wait up to 5s for write lock instead of failing immediately
  timeout: 5000
  pragmas:
    # WAL mode: readers don't block writers, writers don't block readers
    journal_mode: wal
    # NORMAL sync is safe with WAL (data survives process crash, not power loss)
    synchronous: normal
    # 64MB cache in memory (negative = KB, positive = pages)
    cache_size: -65536
    # 128MB memory-mapped I/O for faster reads
    mmap_size: 134217728
    # Limit WAL file growth to 64MB, then auto-checkpoint
    journal_size_limit: 67108864
    # Enforce foreign keys (data integrity)
    foreign_keys: true
    # Wait 5s for lock instead of SQLITE_BUSY error
    busy_timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
